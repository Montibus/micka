<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Micka Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#121212">
  <style>
    :root { --bg: #121212; --text: #ffffff; --muted: #888; --border: #333;}
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); user-select: none; -webkit-user-select: none; height: 100vh; overflow: hidden; display: flex; flex-direction: column;}
    
    /* Install Banner */
    #install-banner { display: none; background: #D32F2F; color: white; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; }

    /* Navigation */
    .nav { display: flex; padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;}
    .nav-btn { flex: 1; padding: 10px; background: none; border: none; color: var(--muted); font-size: 16px; font-weight: bold; cursor: pointer; position: relative;}
    .nav-btn.active { color: var(--text); border-bottom: 2px solid #4CAF50; }
    .warning-badge { position: absolute; top: 0; right: 10px; color: #F44336; font-weight: bold; font-size: 18px; }

    /* Tab Containers */
    .tab-content { flex-grow: 1; padding: 0 15px; display: none; flex-direction: column; overflow: hidden;}
    .tab-content.active { display: flex; }

    /* Walks Layout */
    .history-wrapper { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: flex-end; margin-bottom: 15px; }
    .history-window { overflow-y: auto; display: flex; flex-direction: column; max-height: calc(3 * 42px); padding-bottom: 5px; transition: max-height 0.2s ease-out; }
    
    /* Z-Index Overlay Mode */
    .history-window.overlay-mode { position: absolute; bottom: 0; left: 0; width: 100%; max-height: 50vh; background: rgba(18,18,18,0.95); box-shadow: 0 -10px 20px rgba(0,0,0,0.8); z-index: 10; border-top: 1px solid #333; padding-top: 10px;}
    
    .history-line { display: flex; justify-content: space-between; align-items: center; font-size: 20px; padding: 8px 0; border-bottom: 1px solid #222; transition: opacity 0.3s, transform 0.3s;}
    .history-line.deleting { opacity: 0; transform: translateX(-50px); }
    .history-line:last-child { border-bottom: none; }
    
    /* Typography */
    .hl-left { display: flex; align-items: center; gap: 8px; }
    .hl-time { color: var(--muted); font-size: 18px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .hl-dash { color: #555; }
    .hl-person { font-weight: bold; color: white; }
    .hl-icons { font-size: 24px; letter-spacing: 2px; }
    .green-dog { display: inline-block; color: transparent; text-shadow: 0 0 0 #4CAF50; }
    .red-note { color: #F44336; font-weight: bold; font-size: 18px; margin-left: 5px; cursor: pointer; }

    /* 2x2 Grid */
    .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 20px; flex-shrink: 0; }
    .btn { touch-action: none; padding: 35px 0; font-size: 50px; border: none; border-radius: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; align-items: center; }
    .btn:active { opacity: 0.6; }
    
    .btn-green { background: #1B5E20; }
    .btn-brown { background: #4E342E; }
    .btn-yellow { background: #F57F17; }
    .btn-blue { background: #0D47A1; }

    /* Locks & Toasts */
    .custody-lock { display: none; flex-grow: 1; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; letter-spacing: 2px; color: #F57F17;}
    #toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none;}

    /* List Tabs */
    .list-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; font-size: 16px;}
    .list-label { font-weight: bold; color: #aaa; }
    .list-val { text-align: right; }
    .category-header { color: #4CAF50; font-weight: bold; margin-top: 15px; padding-bottom: 5px; border-bottom: 1px solid #4CAF50;}
    .warn-text { color: #F44336; font-weight: bold; }
  </style>
</head>
<body>

  <div id="install-banner">📲 Tap here to Install App to Home Screen</div>
  <div id="toast">Message</div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('logs', this)">Walks</button>
    <button class="nav-btn" onclick="switchTab('health', this)">Passport</button>
    <button class="nav-btn" onclick="switchTab('events', this)">Events <span id="event-warning" class="warning-badge" style="display:none;">!</span></button>
  </div>

  <!-- WALKS TAB -->
  <div id="logs" class="tab-content active">
    <div id="custody-lock" class="custody-lock"></div>

    <div id="active-interface" style="display: flex; flex-direction: column; height: 100%;">
      <div class="history-wrapper">
         <div class="history-window" id="history-container">
            <div style="color: #555; text-align: center; margin: auto;">Loading...</div>
         </div>
      </div>

      <div class="grid-2x2">
        <button class="btn btn-green" id="btn-walk"><span class="green-dog">🐕</span></button>
        <button class="btn btn-brown" id="btn-poop">💩</button>
        <button class="btn btn-yellow" id="btn-custody">👤</button>
        <button class="btn btn-blue" id="btn-puddle">💦</button>
      </div>
    </div>
  </div>

  <!-- PASSPORT TAB -->
  <div id="health" class="tab-content" style="overflow-y: auto;">
    <h2 id="passport-title" style="font-size: 28px; color: #4CAF50; margin: 10px 0;">Micka</h2>
    <div id="passport-container">Loading...</div>
  </div>

  <!-- EVENTS TAB -->
  <div id="events" class="tab-content" style="overflow-y: auto;">
    <div id="events-container">Loading...</div>
  </div>

  <script>
    // ========================================================================
    // ⬇️ ⬇️ ⬇️ DO NOT DELETE - THIS IS YOUR GOOGLE SCRIPT CONNECTION ⬇️ ⬇️ ⬇️
    // ========================================================================
    
    const API_URL = "YOUR_NEW_WEB_APP_URL_HERE";
    
    // ========================================================================
    // ⬆️ ⬆️ ⬆️ YOUR GOOGLE SCRIPT URL ENDS HERE ⬆️ ⬆️ ⬆️
    // ========================================================================

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Handle Custom Install Banner
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'block';
    });

    document.getElementById('install-banner').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
        deferredPrompt = null;
      }
    });

    // App Initialization
    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || localStorage.getItem('micka_walker') || "Someone";
    localStorage.setItem('micka_walker', currentUser);
    
    window.oncontextmenu = function(event) { event.preventDefault(); event.stopPropagation(); return false; };

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 2500);
    }
    
    function formatTime(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const time = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      
      const isToday = d.toDateString() === now.toDateString();
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      const isYesterday = d.toDateString() === yesterday.toDateString();

      // Tabular alignment via hidden character
      if (isToday) return `<span style="visibility: hidden;">◀</span> ${time}`;
      if (isYesterday) return `◀ ${time}`;
      return `${time}`;
    }

    // Touch Interaction Logic (20px Tolerance)
    function setupTouch(el, onShort, onLong) {
      let timer; let isLong = false;
      let startX, startY;
      
      const start = (e) => {
         isLong = false;
         startX = e.touches ? e.touches[0].clientX : e.clientX;
         startY = e.touches ? e.touches[0].clientY : e.clientY;
         
         timer = setTimeout(() => {
            isLong = true;
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
            onLong();
         }, 600);
      };

      const move = (e) => {
         if (!timer) return;
         let currentX = e.touches ? e.touches[0].clientX : e.clientX;
         let currentY = e.touches ? e.touches[0].clientY : e.clientY;
         // Cancel if finger moves more than 20px
         if (Math.abs(currentX - startX) > 20 || Math.abs(currentY - startY) > 20) {
            clearTimeout(timer); timer = null;
         }
      };
      
      const end = (e) => {
         if (timer) clearTimeout(timer);
         if (!isLong && onShort) onShort();
      };
      
      el.addEventListener('touchstart', start, {passive: true});
      el.addEventListener('touchmove', move, {passive: true});
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mousemove', move);
      el.addEventListener('mouseup', end);
      el.addEventListener('mouseleave', () => { if (timer) clearTimeout(timer); });
    }

    // Assign Button Actions
    const askNote = (type, poop, puddle) => {
      let note = prompt("Enter note (blood, diarrhea, etc.):");
      if (note !== null) logWalk(poop, puddle, type, note);
    };

    setupTouch(document.getElementById('btn-walk'), () => logWalk(false, false, 'Long Walk', ""), () => askNote('Long Walk', false, false));
    setupTouch(document.getElementById('btn-poop'), () => logWalk(true, false, 'Action', ""), () => askNote('Action', true, false));
    setupTouch(document.getElementById('btn-puddle'), () => logWalk(false, true, 'Action', ""), () => askNote('Action', false, true));
    
    // Custody Button Logic (Long Press Only, Short Tap Does Nothing)
    let isCurrentlyCustodian = false;
    setupTouch(document.getElementById('btn-custody'), 
      () => showToast("Hold to take custody"), 
      () => logWalk(false, false, isCurrentlyCustodian ? 'Returned' : 'Custody', "")
    );

    // History Window Overlay Toggle Logic
    const container = document.getElementById('history-container');
    let isOverlayActive = false;
    
    function isAtBottom() {
      // Check if we are within 5px of the absolute bottom
      return Math.abs(container.scrollHeight - container.clientHeight - container.scrollTop) <= 5;
    }

    setupTouch(container, null, () => {
       if (!isAtBottom() && !isOverlayActive) {
          // Snap to bottom if viewing history inline
          container.scrollTop = container.scrollHeight; 
       } else {
          // Toggle Overlay Mode
          isOverlayActive = !isOverlayActive;
          container.classList.toggle('overlay-mode', isOverlayActive);
          if (isOverlayActive) container.scrollTop = container.scrollHeight;
       }
    });

    // Swipe to Undo Logic
    let touchX = 0;
    container.addEventListener('touchstart', e => { touchX = e.changedTouches[0].screenX; }, {passive: true});
    container.addEventListener('touchend', e => {
      // STRICT GATEKEEPER: Overlay must be off AND scroll must be at absolute bottom
      if (!isOverlayActive && isAtBottom()) {
         if (touchX - e.changedTouches[0].screenX > 60) {
            requestUndo();
         }
      }
    }, {passive: true});

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json(); 
        
        // 1. Custody State Check
        const isAway = data.status.type === 'Custody';
        const lockScreen = document.getElementById('custody-lock');
        const activeUI = document.getElementById('active-interface');
        const yellowBtn = document.getElementById('btn-custody');

        if (isAway && data.status.who !== currentUser) {
            activeUI.style.display = 'none';
            lockScreen.style.display = 'flex';
            lockScreen.innerText = data.status.who;
        } else {
            activeUI.style.display = 'flex';
            lockScreen.style.display = 'none';
            isCurrentlyCustodian = (isAway && data.status.who === currentUser);
            yellowBtn.innerHTML = isCurrentlyCustodian ? '🏡' : '👤';
        }

        // 2. The 10-Minute Visual Merge 
        let mergedLogs = [];
        let currentGroup = null;
        
        data.logs.forEach(log => {
           if (log.type === 'Custody' || log.type === 'Returned') {
               if (currentGroup) mergedLogs.push(currentGroup);
               mergedLogs.push({...log});
               currentGroup = null; 
               return;
           }
           if (!currentGroup) {
               currentGroup = {...log};
           } else {
               const diffMins = (new Date(log.time) - new Date(currentGroup.time)) / 60000;
               if (diffMins <= 10 && log.who === currentGroup.who) {
                   currentGroup.poop = currentGroup.poop || log.poop;
                   currentGroup.puddle = currentGroup.puddle || log.puddle;
                   if (log.type === 'Long Walk') currentGroup.type = 'Long Walk';
                   if (log.note) currentGroup.note = currentGroup.note + " | " + log.note;
               } else {
                   mergedLogs.push(currentGroup);
                   currentGroup = {...log};
               }
           }
        });
        if (currentGroup) mergedLogs.push(currentGroup);

        // 3. Render Walks
        let html = '';
        mergedLogs.forEach((log, index) => {
           let icons = '';
           if (log.type === 'Custody') icons = '👤';
           else if (log.type === 'Returned') icons = '🏡';
           else {
               if (log.type === 'Long Walk') icons += '<span class="green-dog">🐕</span> ';
               if (log.poop) icons += '💩 ';
               if (log.puddle) icons += '💦 ';
               if (log.note) icons += `<span class="red-note" onclick="alert('${log.note}')">❗</span>`;
           }
           
           // Tag the very last row so we can animate it on undo
           let idTag = (index === mergedLogs.length - 1) ? 'id="latest-row"' : '';

           html += `
             <div class="history-line" ${idTag}>
               <div class="hl-left">
                 <span class="hl-time">${formatTime(log.time)}</span>
                 <span class="hl-dash">&mdash;</span>
                 <span class="hl-person">${log.who}</span>
               </div>
               <div class="hl-icons">${icons}</div>
             </div>`;
        });
        
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;

        // 4. Render Passport
        let passHtml = '';
        data.dogInfo.forEach(info => {
            if (info.label.toLowerCase() === 'name') {
                document.getElementById('passport-title').innerText = info.value;
            } else {
                passHtml += `<div class="list-row"><span class="list-label">${info.label}</span><span class="list-val">${info.value}</span></div>`;
            }
        });
        document.getElementById('passport-container').innerHTML = passHtml;

        // 5. Render Events & Warning Logic
        let evHtml = '';
        let hasWarning = false;
        let categories = {};
        
        // Group by category
        data.events.forEach(ev => {
            if (!categories[ev.category]) categories[ev.category] = [];
            categories[ev.category].push(ev);
            if (ev.warning) hasWarning = true;
        });

        for (const [cat, items] of Object.entries(categories)) {
            evHtml += `<div class="category-header">${cat}</div>`;
            items.forEach(item => {
                let warnClass = item.warning ? "warn-text" : "";
                let d = new Date(item.date);
                let valStr = !isNaN(d) ? `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}` : item.date;
                evHtml += `<div class="list-row"><span class="list-label ${warnClass}">${item.item}</span><span class="list-val ${warnClass}">${valStr}</span></div>`;
            });
        }
        document.getElementById('events-container').innerHTML = evHtml;
        if (hasWarning) document.getElementById('event-warning').style.display = 'inline';
        
      } catch (e) {
        container.innerHTML = '<div style="color:red; text-align:center;">Network Error</div>';
      }
    }

    async function logWalk(poop, puddle, type, note) {
      if (navigator.vibrate) navigator.vibrate(50);
      showToast("Saving...");
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ poop, puddle, type, who: currentUser, note: note })
      });
      location.reload(); 
    }
    
    async function requestUndo() {
      // Optimistic UI: Instantly hide the row and show toast
      const lastRow = document.getElementById('latest-row');
      if (lastRow) lastRow.classList.add('deleting');
      if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
      showToast("Deleting...");

      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'undo' })
      });
      const result = await res.json();
      
      if (result.status === 'success') {
          location.reload();
      } else {
          if (lastRow) lastRow.classList.remove('deleting'); // Bring it back
          showToast("Too late to delete!");
      }
    }

    fetchData();
  </script>
</body>
</html>
