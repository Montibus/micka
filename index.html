<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dog Walker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f9; }
    .status-banner { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn { display: block; width: 100%; padding: 25px; margin: 15px 0; font-size: 24px; border: none; border-radius: 16px; cursor: pointer; color: white; transition: opacity 0.2s; }
    .btn:active { opacity: 0.7; }
    .btn-poop { background: #8B4513; }
    .btn-puddle { background: #4169E1; }
    .btn-walk { background: #2E8B57; }
    .manual-entry { margin-top: 30px; color: #666; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <div class="status-banner">
    <h2 style="margin:0; font-size: 18px; color: #333;">Last Walked</h2>
    <p id="lastWalkTime" style="font-size: 16px; color: #666;">Loading...</p>
    <div id="lastWalkResults" style="font-size: 24px;"></div>
  </div>

  <button class="btn btn-poop" onclick="logWalk(true, false, 'Action')">💩 Poop</button>
  <button class="btn btn-puddle" onclick="logWalk(false, true, 'Action')">💦 Puddle</button>
  <button class="btn btn-walk" onclick="logWalk(false, false, 'Just Walk')">🐾 Just Walk</button>

  <div class="manual-entry" onclick="alert('Manual entry modal would open here')">Log a past walk manually</div>

  <script>
    // Your active Google Apps Script Web App URL
    const API_URL = "https://script.google.com/macros/s/AKfycbzzJ7r3AJZWwW0T2yTaNpmFtZz6bUh37xrb7jj_Qr4N_dLNiQz3nGoOBqzNt_hONA2K/exec";

    async function fetchLastWalk() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        if (data.time) {
          const date = new Date(data.time);
          document.getElementById('lastWalkTime').innerText = date.toLocaleString();
          document.getElementById('lastWalkResults').innerText = 
            (data.poop ? "💩 " : "") + (data.puddle ? "💦 " : "");
        } else {
          document.getElementById('lastWalkTime').innerText = "No records yet.";
        }
      } catch (e) {
        document.getElementById('lastWalkTime').innerText = "Error loading data.";
      }
    }

    async function logWalk(poop, puddle, type) {
      // Visual feedback
      document.getElementById('lastWalkTime').innerText = "Saving...";
      
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ poop, puddle, type, timestamp: new Date().toISOString() })
      });
      
      fetchLastWalk();
    }

    // Load data on start
    fetchLastWalk();
  </script>
</body>
</html>
