<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Micka Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">
  <style>
    :root { --bg: #121212; --text: #ffffff; --muted: #888; --border: #333;}
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); user-select: none; -webkit-user-select: none; overflow: hidden;}
    
    .nav { display: flex; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 15px;}
    .nav-btn { flex: 1; padding: 10px; background: none; border: none; color: var(--muted); font-size: 16px; font-weight: bold; cursor: pointer; }
    .nav-btn.active { color: var(--text); border-bottom: 2px solid #4CAF50; }
    
    .tab-content { display: none; padding: 0 15px; height: calc(100vh - 70px); display: flex; flex-direction: column;}
    .tab-content.hidden { display: none !important; }

    /* The 3-Line Flat History Window */
    .history-window { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);}
    .history-line { display: flex; justify-content: space-between; align-items: center; font-size: 20px; padding: 8px 0; border-bottom: 1px solid #222; }
    .history-line:last-child { border-bottom: none; }
    
    /* Typography & Alignment */
    .hl-left { display: flex; align-items: center; gap: 8px; }
    .hl-time { color: var(--muted); font-size: 18px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .hl-dash { color: #555; }
    .hl-person { font-weight: bold; color: white; }
    .hl-icons { font-size: 24px; letter-spacing: 2px; }
    
    .green-dog { display: inline-block; color: transparent; text-shadow: 0 0 0 #4CAF50; }
    .red-note { color: #F44336; font-weight: bold; font-size: 18px; margin-left: 5px; }

    /* 2x2 Ergonomic Grid */
    .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 20px; }
    .btn { padding: 35px 0; font-size: 50px; border: none; border-radius: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; align-items: center; }
    .btn:active { opacity: 0.6; }
    
    .btn-green { background: #1B5E20; }
    .btn-brown { background: #4E342E; }
    .btn-yellow { background: #F57F17; }
    .btn-blue { background: #0D47A1; }

    /* Custody Lock Screen */
    .custody-lock { display: none; flex-grow: 1; flex-direction: column; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; letter-spacing: 2px; color: #F57F17;}
    
    /* Health Tab */
    .health-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; font-size: 16px;}
    .health-label { font-weight: bold; color: #aaa; }
  </style>
</head>
<body>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('logs', this)">Walks</button>
    <button class="nav-btn" onclick="switchTab('health', this)">Passport</button>
  </div>

  <div id="logs" class="tab-content">
    
    <!-- Locked view for non-custodians -->
    <div id="custody-lock" class="custody-lock"></div>

    <!-- Active view for everyone else -->
    <div id="active-interface" style="display: flex; flex-direction: column; height: 100%;">
      
      <div class="history-window" id="history-container">
         <div style="color: #555; text-align: center; margin: auto;">Loading...</div>
      </div>

      <div class="grid-2x2">
        <button class="btn btn-green" id="btn-walk"><span class="green-dog">🐕</span></button>
        <button class="btn btn-brown" id="btn-poop">💩</button>
        <button class="btn btn-yellow" id="btn-custody">👤</button>
        <button class="btn btn-blue" id="btn-puddle">💦</button>
      </div>
      
    </div>
  </div>

  <div id="health" class="tab-content hidden" style="display: block;">
    <div id="passport-container">Loading...</div>
  </div>

  <script>
    // ========================================================================
    // ⬇️ ⬇️ ⬇️ DO NOT DELETE - THIS IS YOUR GOOGLE SCRIPT CONNECTION ⬇️ ⬇️ ⬇️
    // ========================================================================
    
    const API_URL = "https://script.google.com/macros/s/AKfycbzPSi_-36T2dt6KcujJJxfr48MxyWCZt0_fsTc45PU37XYiTry67YuNRZP9ivtQpvEL/exec";
    
    // ========================================================================
    // ⬆️ ⬆️ ⬆️ YOUR GOOGLE SCRIPT URL ENDS HERE ⬆️ ⬆️ ⬆️
    // ========================================================================

    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || localStorage.getItem('micka_walker') || "Someone";
    localStorage.setItem('micka_walker', currentUser);
    
    window.oncontextmenu = function(event) { event.preventDefault(); event.stopPropagation(); return false; };

    function switchTab(tabId, btn) {
      document.getElementById('logs').classList.add('hidden');
      document.getElementById('health').classList.add('hidden');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.remove('hidden');
      btn.classList.add('active');
    }
    
    // Tabular Time Formatting
    function formatTime(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const time = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      
      const isToday = d.toDateString() === now.toDateString();
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      const isYesterday = d.toDateString() === yesterday.toDateString();

      if (isToday) return `<span style="visibility: hidden;">◀</span> ${time}`;
      if (isYesterday) return `◀ ${time}`;
      return `${time}`; // Fallback for much older, though rare
    }

    // Long Press Notes Logic
    function setupButton(elId, actionFn) {
      const el = document.getElementById(elId);
      let timer; let isLong = false;
      
      const start = (e) => {
         isLong = false;
         timer = setTimeout(() => {
            isLong = true;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            let note = prompt("Enter note (blood, diarrhea, etc.):");
            if (note !== null) actionFn(note);
         }, 600);
      };
      const end = (e) => {
         clearTimeout(timer);
         if (!isLong) actionFn("");
         if (e.cancelable) e.preventDefault();
      };
      
      el.addEventListener('touchstart', start, {passive: true});
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', end);
      el.addEventListener('mouseleave', () => clearTimeout(timer));
    }

    // Assign standard actions
    setupButton('btn-walk', (note) => logWalk(false, false, 'Long Walk', note));
    setupButton('btn-poop', (note) => logWalk(true, false, 'Action', note));
    setupButton('btn-puddle', (note) => logWalk(false, true, 'Action', note));
    
    // Yellow Custody Button Logic
    let isCurrentlyCustodian = false;
    document.getElementById('btn-custody').onclick = () => {
      if (confirm(`Are you sure you want to ${isCurrentlyCustodian ? "return the dog" : "take the dog"}?`)) {
          logWalk(false, false, isCurrentlyCustodian ? 'Returned' : 'Custody', "");
      }
    };

    // Swipe to Undo Logic
    let touchstartX = 0;
    let container = document.getElementById('history-container');
    container.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
    container.addEventListener('touchend', e => {
      if (touchstartX - e.changedTouches[0].screenX > 60) { // Swiped Left
         requestUndo();
      }
    }, {passive: true});

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json(); 
        
        // 1. Custody State Check
        const isAway = data.status.type === 'Custody';
        const lockScreen = document.getElementById('custody-lock');
        const activeUI = document.getElementById('active-interface');
        const yellowBtn = document.getElementById('btn-custody');

        if (isAway && data.status.who !== currentUser) {
            activeUI.style.display = 'none';
            lockScreen.style.display = 'flex';
            lockScreen.innerText = data.status.who;
        } else {
            activeUI.style.display = 'flex';
            lockScreen.style.display = 'none';
            
            if (isAway && data.status.who === currentUser) {
                isCurrentlyCustodian = true;
                yellowBtn.innerHTML = '🏡';
            } else {
                isCurrentlyCustodian = false;
                yellowBtn.innerHTML = '👤';
            }
        }

        // 2. The 10-Minute Visual Merge 
        let mergedLogs = [];
        let currentGroup = null;
        
        data.logs.forEach(log => {
           if (log.type === 'Custody' || log.type === 'Returned') {
               if (currentGroup) mergedLogs.push(currentGroup);
               mergedLogs.push({...log});
               currentGroup = null; 
               return;
           }

           if (!currentGroup) {
               currentGroup = {...log};
           } else {
               const diffMins = (new Date(log.time) - new Date(currentGroup.time)) / 60000;
               // If within 10 minutes and same person, squash them together
               if (diffMins <= 10 && log.who === currentGroup.who) {
                   currentGroup.poop = currentGroup.poop || log.poop;
                   currentGroup.puddle = currentGroup.puddle || log.puddle;
                   if (log.type === 'Long Walk') currentGroup.type = 'Long Walk';
                   if (log.note) currentGroup.note = currentGroup.note ? currentGroup.note + " | " + log.note : log.note;
               } else {
                   mergedLogs.push(currentGroup);
                   currentGroup = {...log};
               }
           }
        });
        if (currentGroup) mergedLogs.push(currentGroup);

        // 3. Render the Flat 3-Line List
        let html = '';
        mergedLogs.forEach(log => {
           let icons = '';
           if (log.type === 'Custody') icons = '👤';
           else if (log.type === 'Returned') icons = '🏡';
           else {
               if (log.type === 'Long Walk') icons += '<span class="green-dog">🐕</span> ';
               if (log.poop) icons += '💩 ';
               if (log.puddle) icons += '💦 ';
               if (log.note) icons += `<span class="red-note" onclick="alert('${log.note}')">❗</span>`;
           }
           
           html += `
             <div class="history-line">
               <div class="hl-left">
                 <span class="hl-time">${formatTime(log.time)}</span>
                 <span class="hl-dash">&mdash;</span>
                 <span class="hl-person">${log.who}</span>
               </div>
               <div class="hl-icons">${icons}</div>
             </div>`;
        });
        
        container.innerHTML = html;
        // Scroll to the absolute bottom (newest items)
        container.scrollTop = container.scrollHeight; 

        // 4. Passport
        let passHtml = '';
        data.dogInfo.forEach(info => {
            passHtml += `<div class="health-row"><span class="health-label">${info.label}</span><span>${info.value}</span></div>`;
        });
        document.getElementById('passport-container').innerHTML = passHtml;
        
      } catch (e) {
        container.innerHTML = '<div style="color:red; text-align:center;">Network Error</div>';
      }
    }

    async function logWalk(poop, puddle, type, note) {
      if (navigator.vibrate) navigator.vibrate(50);
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ poop, puddle, type, who: currentUser, note: note })
      });
      location.reload(); 
    }
    
    async function requestUndo() {
      if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'undo' })
      });
      const result = await res.json();
      if (result.status === 'success') {
          location.reload();
      } else {
          alert("Too late to undo! (More than 60 seconds passed)");
      }
    }

    switchTab('logs', document.querySelector('.nav-btn')); // Start on logs tab, not health
    fetchData();
  </script>
</body>
</html>
