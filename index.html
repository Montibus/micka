<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Micka Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">
  <style>
    :root { --bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; --green: #4CAF50; --muted: #aaa; --border: #333;}
    body { font-family: system-ui, sans-serif; text-align: center; margin: 0; padding: 0; background: var(--bg); color: var(--text); padding-bottom: 20px; user-select: none; -webkit-user-select: none;}
    
    .nav { display: flex; background: var(--card-bg); padding: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border); }
    .nav-btn { flex: 1; padding: 10px; background: none; border: none; color: var(--muted); font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; }
    .nav-btn.active { background: #333; color: var(--text); border-bottom: 2px solid var(--green); }

    .tab-content { display: none; padding: 0 15px; }
    .tab-content.active { display: block; }

    /* Dashboard Layout */
    .primary-status { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); transition: background 0.3s;}
    .primary-status.away { background: #3a2a18; border-color: #f57c00; }
    .primary-label { color: var(--green); font-size: 16px; font-weight: bold; margin-bottom: 5px;}
    .primary-time { font-size: 26px; font-weight: bold; margin: 5px 0; color: #fff; }
    
    .custody-btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 20px; background: #37474F; color: white;}
    .custody-btn.return { background: #E64A19; }

    /* Scrollable History View (Swipe Down to see more) */
    .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 230px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
    .history-item { background: var(--card-bg); padding: 12px 15px; border-radius: 12px; font-size: 14px; text-align: left; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    .history-item.long-walk { background: #112211; border-color: #2E7D32; }
    .history-item.away { background: #2d2116; border-color: #5D4037; }
    
    .history-walker { font-weight: bold; color: var(--text); margin-bottom: 3px; font-size: 15px;}
    .history-time { color: var(--muted); font-size: 12px;}
    .history-results { font-size: 24px; }

    /* Action Buttons */
    .btn-container { display: flex; gap: 15px; margin-bottom: 15px; }
    .btn { flex: 1; padding: 35px 0; font-size: 55px; border: none; border-radius: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;}
    .btn:active { opacity: 0.7; }
    .btn-poop { background: #5D4037; }
    .btn-puddle { background: #1976D2; }
    .btn-walk { width: 100%; padding: 25px; font-size: 45px; background: #2E7D32; border: none; border-radius: 16px; cursor: pointer; }
    
    /* Health Tab */
    .health-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 15px; border: 1px solid var(--border); }
    .health-card h3 { margin: 0 0 10px 0; color: var(--green); }
    .health-row { display: flex; justify-content: space-between; margin: 8px 0; padding-bottom: 8px; border-bottom: 1px solid #333; }
    .health-label { font-weight: bold; color: #ccc; }
    .health-value { color: #fff; text-align: right;}
  </style>
</head>
<body>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('logs', this)">Walks</button>
    <button class="nav-btn" onclick="switchTab('health', this)">Passport</button>
  </div>

  <div id="logs" class="tab-content active">
    
    <div class="primary-status" id="primaryStatus">
      <div class="primary-label" id="status-label">Loading...</div>
      <div class="primary-time" id="status-time"></div>
    </div>
    
    <button id="custody-btn" class="custody-btn" style="display: none;"></button>

    <div class="history-list" id="history-container">
       <!-- Dynamically populated. Scroll to see more. -->
    </div>

    <div class="btn-container">
      <button class="btn btn-poop" id="btn-poop">💩</button>
      <button class="btn btn-puddle" id="btn-puddle">💦</button>
    </div>
    <button class="btn-walk" id="btn-walk">🐾</button>
    
    <p style="color: #666; font-size: 12px; margin-top: 10px;">Press and hold any button for 1s to add a medical note.</p>
  </div>

  <div id="health" class="tab-content">
    <div class="health-card" id="passport-container">
      <h3>Micka's Passport</h3>
      <div style="color: #888;">Loading data...</div>
    </div>
  </div>

  <script>
    // ========================================================================
    // ⬇️ ⬇️ ⬇️ DO NOT DELETE - THIS IS YOUR GOOGLE SCRIPT CONNECTION ⬇️ ⬇️ ⬇️
    // ========================================================================
    
    const API_URL = "https://script.google.com/macros/s/AKfycbwrpxzJS9esgO0u65BRFzzZPJEPxFIYBEtM9-qdp-QqZUOKjwK3aTb3GR6MwXIeB-b2/exec";
    
    // ========================================================================
    // ⬆️ ⬆️ ⬆️ YOUR GOOGLE SCRIPT URL ENDS HERE ⬆️ ⬆️ ⬆️
    // ========================================================================

    // Read ?user= URL parameter and save it permanently for this device
    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || localStorage.getItem('micka_walker') || "Someone";
    localStorage.setItem('micka_walker', currentUser);

    // Disable context menus (right click/long press native menus) to allow custom long-press
    window.oncontextmenu = function(event) { event.preventDefault(); event.stopPropagation(); return false; };

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function formatRelativeTime(dateString) {
      if (!dateString) return "-";
      const date = new Date(dateString);
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      const isYesterday = date.toDateString() === yesterday.toDateString();

      const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
      if (isToday) return `Today, ${timeStr}`;
      if (isYesterday) return `Yesterday, ${timeStr}`;
      return `${date.getDate()}.${date.getMonth()+1}. ${timeStr}`;
    }

    // Custom Long-Press Logic for Note taking
    function setupButton(elId, poop, puddle, type) {
      const el = document.getElementById(elId);
      let timer;
      let isLong = false;
      
      const start = (e) => {
         isLong = false;
         timer = setTimeout(() => {
            isLong = true;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Haptic feedback
            let note = prompt("Enter note (blood, diarrhea, etc.):");
            if (note !== null) logWalk(poop, puddle, type, note);
         }, 600); // 600ms hold triggers note
      };
      
      const end = (e) => {
         clearTimeout(timer);
         if (!isLong) logWalk(poop, puddle, type, ""); // Normal short tap
         if (e.cancelable) e.preventDefault(); // Stop ghost clicks
      };
      
      el.addEventListener('touchstart', start, {passive: true});
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', end);
      el.addEventListener('mouseleave', () => clearTimeout(timer));
    }

    // Attach logic to buttons
    setupButton('btn-poop', true, false, 'Action');
    setupButton('btn-puddle', false, true, 'Action');
    setupButton('btn-walk', false, false, 'Long Walk'); // Green button now does Long Walk

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json(); 
        
        // 1. Setup Status & Custody Banner
        const isAway = data.status.type === 'Custody';
        const primaryStatus = document.getElementById('primaryStatus');
        const cBtn = document.getElementById('custody-btn');
        
        if (isAway) {
            primaryStatus.classList.add('away');
            document.getElementById('status-label').innerText = "Currently Away With:";
            document.getElementById('status-time').innerText = data.status.who;
            
            // Only show return button if THIS phone belongs to the person who took the dog
            if (currentUser === data.status.who) {
                cBtn.innerText = "🔙 Return to Collective Care";
                cBtn.className = "custody-btn return";
                cBtn.onclick = () => logWalk(false, false, 'Returned', "");
                cBtn.style.display = "block";
            } else {
                cBtn.style.display = "none";
            }
        } else {
            primaryStatus.classList.remove('away');
            document.getElementById('status-label').innerText = "Last Walk";
            
            // Find the most recent actual walk for the banner
            const lastActualWalk = data.logs.find(l => l.type === 'Action' || l.type === 'Long Walk');
            let bannerIcons = '';
            if (lastActualWalk) {
               document.getElementById('status-time').innerText = formatRelativeTime(lastActualWalk.time);
               if (lastActualWalk.type === 'Long Walk') bannerIcons += '<span style="color: #4CAF50;">🐕</span> ';
               if (lastActualWalk.poop) bannerIcons += '💩 ';
               if (lastActualWalk.puddle) bannerIcons += '💦 ';
               document.getElementById('status-label').innerHTML = `Last Walk &nbsp;&nbsp;&nbsp; <span style="font-size:24px;">${bannerIcons}</span>`;
            }
            
            cBtn.innerText = "🏡 Dog is with me";
            cBtn.className = "custody-btn";
            cBtn.onclick = () => logWalk(false, false, 'Custody', "");
            cBtn.style.display = "block";
        }

        // 2. Build Scrollable History
        let historyHTML = '';
        data.logs.forEach(log => {
           let cssClass = 'history-item';
           let iconHTML = '';
           
           if (log.type === 'Custody') {
              cssClass += ' away';
              iconHTML = '👤';
           } else if (log.type === 'Returned') {
              cssClass += ' away';
              iconHTML = '👥';
           } else if (log.type === 'Long Walk') {
              cssClass += ' long-walk';
              iconHTML = '<span style="color: #4CAF50;">🐕</span>'; // Green running dog
           } else {
              iconHTML = '🐾';
           }
           
           if (log.poop) iconHTML += ' 💩';
           if (log.puddle) iconHTML += ' 💦';
           if (log.note) iconHTML += ' <span style="color: red; font-weight:bold; margin-left: 5px;">❗</span>';
           
           // If it has a note, make the row clickable to read it
           let clickAction = log.note ? `onclick="alert('Note from ${log.who}:\\n${log.note}')"` : '';
           
           historyHTML += `
             <div class="${cssClass}" ${clickAction}>
               <div>
                 <div class="history-walker">${log.who}</div>
                 <div class="history-time">${formatRelativeTime(log.time)}</div>
               </div>
               <div class="history-results">${iconHTML}</div>
             </div>`;
        });
        document.getElementById('history-container').innerHTML = historyHTML;

        // 3. Populate Passport Data
        let passportHTML = '<h3>Micka\'s Passport</h3>';
        data.dogInfo.forEach(info => {
            passportHTML += `
              <div class="health-row">
                 <div class="health-label">${info.label}</div>
                 <div class="health-value">${info.value}</div>
              </div>`;
        });
        document.getElementById('passport-container').innerHTML = passportHTML;
        
      } catch (e) {
        document.getElementById('status-label').innerText = "Network Error";
        document.getElementById('status-time').innerText = "Please check URL.";
      }
    }

    async function logWalk(poop, puddle, type, note) {
      document.getElementById('status-time').innerText = "Saving...";
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ poop, puddle, type, who: currentUser, note: note })
      });
      location.reload(); 
    }

    fetchData();
  </script>
</body>
</html>
